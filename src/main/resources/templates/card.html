<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Document</title>
</head>
<body>
    <form action="/card" method="post">
        <input name="cardNumber" type="text" placeholder="카드번호">
        <input name="cardDate" type="text" placeholder="유효기간">
        <input name="cardType" type="text" placeholder="카드종류">
        <button type="submit">등록</button>
    </form>
    <div th:each="card : ${card}">
        <p th:text="${card}"></p>
    </div>
</body>
</html>
